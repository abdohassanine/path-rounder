<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Path Corner Rounder Demo</title>
        <link rel="icon" type="image/svg+xml" href="./favicon.svg">
        <link rel="stylesheet" href="./styles.css">
    </head>
    <body>
        <main class="page">
            <header class="hero">
                <h1>Path Corner Rounder</h1>
                <p>Rounds corners between any combination of lines and Bezier curves. Dashed gray = original, blue = rounded.</p>
            </header>
            <section class="controls" aria-label="Demo controls">
                <label>
                    Radius:
                    <input
                        type="range"
                        id="radius"
                        min="0"
                        max="80"
                        value="30"
                    >
                    <span id="rval">30</span>
                </label>
            </section>
            <section class="row">
                <article class="card">
                    <h3>Line → Line</h3>
                    <svg
                        id="svg1"
                        width="280"
                        height="220"
                        viewBox="0 0 280 220"
                    ></svg>
                </article>
                <article class="card">
                    <h3>Line → Curve (cubic)</h3>
                    <svg
                        id="svg2"
                        width="280"
                        height="220"
                        viewBox="0 0 280 220"
                    ></svg>
                </article>
                <article class="card">
                    <h3>Curve → Curve (cubic ↔ cubic)</h3>
                    <svg
                        id="svg3"
                        width="280"
                        height="220"
                        viewBox="0 0 280 220"
                    ></svg>
                </article>
                <article class="card card-wide">
                    <h3>Mixed multi-corner path</h3>
                    <svg
                        id="svg4"
                        width="600"
                        height="280"
                        viewBox="0 0 600 280"
                    ></svg>
                </article>
            </section>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/path-rounder@0.1.0/path-rounder.js"></script>
        <script src="./main.js"></script>
    </body>
</html>
